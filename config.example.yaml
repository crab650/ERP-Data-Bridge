source:
  type: mssql
  server: "SOURCE_SERVER"
  database: "SourceDatabase"
  username: "sa"
  password_env: "SOURCE_DB_PASSWORD"
  driver: "ODBC Driver 17 for SQL Server"
  trust_server_certificate: true

target:
  type: mssql
  server: "TARGET_SERVER"
  database: "TargetDatabase"
  username: "sa"
  password_env: "TARGET_DB_PASSWORD"
  driver: "ODBC Driver 17 for SQL Server"
  trust_server_certificate: true

# To export into SQLite instead of SQL Server, replace the target block above with:
#
# target:
#   type: sqlite
#   database: "data/export.sqlite"

options:
  tables: []
  batch_size: 5000
  if_exists: recreate
  include_data: true
  include_primary_keys: true
  include_indexes: true
  preserve_identity: true
  verify_row_counts: true
  # Optional per-table source filters. Keys can be full table names or table names.
  # where:
  #   dbo.C_SCADA_DataArchive: "Timestamp >= '2026-06-01' AND Timestamp < '2026-07-01'"
  #   Customers: "IsActive = 1"
  where: {}
